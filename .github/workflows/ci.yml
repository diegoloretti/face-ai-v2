name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r typecheck

  test-web:
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @face-ai/web test

  test-api:
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @face-ai/api test
        env:
          SKIP_HUMAN_INTEGRATION: 'true'

  test-shared:
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @face-ai/shared test

  audit:
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  audit-lgpd-no-storage:
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Reject sessionStorage/localStorage usage em apps/web/src
        run: |
          # NOTA: pattern usa "window\.(session|local)Storage" e
          # "(session|local)Storage\." pra evitar falso-positivo no
          # comment JSDoc do useSession.ts que cita os nomes das APIs
          # literalmente (Plano 4 Task 10 audit comment).
          if grep -rnE "window\.(session|local)Storage|\b(session|local)Storage\.[a-zA-Z]" apps/web/src; then
            echo "::error::Persistência em sessionStorage/localStorage não permitida (audit LGPD Plano 4)."
            echo "Vide apps/web/src/hooks/useSession.ts comment de audit."
            exit 1
          fi
          echo "audit LGPD OK - sem persistência sensível"

  e2e:
    runs-on: ubuntu-latest
    needs: [test-web, audit-lgpd-no-storage]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Aguardar Vercel preview deploy
        id: wait-deploy
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          environment: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}

      - name: Install Playwright browsers
        run: pnpm --filter @face-ai/web exec playwright install --with-deps chromium

      - name: Run smoke e2e contra preview URL
        env:
          BASE_URL: ${{ steps.wait-deploy.outputs.url }}
          CI: 'true'
        run: pnpm --filter @face-ai/web run test:e2e --project=chromium-desktop --grep "smoke fluxo principal"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
