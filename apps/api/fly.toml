# 512MB é o piso pra tfjs-node + Human warmup eager (256MB OOM no boot).
# Subir pra 1024 se aparecer OOM em prod sob carga.
app = "face-ai-v2"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
